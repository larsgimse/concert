<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Konserter</title>
    <style>
        /* Mørkt og stilig konsert-tema */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 3rem 1rem;
            width: 100%;
            background: linear-gradient(180deg, #1f2833 0%, #0b0c10 100%);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #66fcf1;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            color: #45f3ff;
            margin-top: 0.5rem;
            font-style: italic;
        }

        /* Container for konsertene */
        .concert-container {
            max-width: 800px;
            width: 90%;
            margin: 2rem 0;
        }

        /* Styling for hvert konsert-kort */
        .concert-card {
            background-color: #1f2833;
            border-left: 5px solid #66fcf1;
            border-radius: 4px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .concert-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 252, 241, 0.15);
        }

        .concert-info h2 {
            margin: 0 0 0.3rem 0;
            color: #ffffff;
            font-size: 1.3rem;
        }

        .concert-details {
            font-size: 0.9rem;
            color: #a9b7c6;
        }

        .concert-details .location {
            color: #45f3ff;
            font-weight: 500;
        }

        /* Dato-merkelapp */
        .concert-date {
            background-color: #0b0c10;
            color: #66fcf1;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid #66fcf1;
            white-space: nowrap;
            font-family: monospace; /* Gjør at datoer rykker likt */
        }

        .status-msg {
            text-align: center;
            font-style: italic;
            color: #a9b7c6;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mine Konsertopplevelser</h1>
        <p>Generert automatisk fra konsertliste.txt</p>
    </header>

    <main class="concert-container" id="concert-list">
        <p class="status-msg">Laster inn konsertene dine...</p>
    </main>

    <script>
        async function lastInnKonserter() {
            const container = document.getElementById('concert-list');
            
            try {
                const response = await fetch('konsertliste.txt');
                if (!response.ok) throw new Error('Kunne ikke laste konsertliste.txt');
                
                const tekstData = await response.text();
                const linjer = tekstData.split('\n');
                
                container.innerHTML = '';
                let totaltAntall = 0;

                linjer.forEach(linje => {
                    if (linje.trim() === '') return;

                    // Splitter artisten fra konsertene (håndterer både vanlig bindestrek - og tankestrek –)
                    const separator = linje.includes('–') ? '–' : '-';
                    const deler = linje.split(separator);
                    
                    if (deler.length >= 2) {
                        const artist = deler[0].trim();
                        // Resten av linjen inneholder konsertene (f.eks: "NO (11-09-1989), NO (11-09-1989)")
                        const konsertDel = deler.slice(1).join(separator).trim();

                        // Bruker RegEx (regulært uttrykk) til å finne alle mønstre som matcher "LAND (DATO)"
                        // Eksempel: NO (11-09-1989)
                        const regex = /([A-Z]{2,3})\s*\(([^)]+)\)/g;
                        let match;

                        while ((match = regex.exec(konsertDel)) !== null) {
                            const land = match[1];  // F.eks. NO
                            const dato = match[2];  // F.eks. 11-09-1989
                            totaltAntall++;

                            // Lager kortet for denne spesifikke konserten
                            const kortHTML = `
                                <div class="concert-card">
                                    <div class="concert-info">
                                        <h2>${artist}</h2>
                                        <div class="concert-details">
                                            <span class="location">🌍 ${land}</span>
                                        </div>
                                    </div>
                                    <div class="concert-date">
                                        📅 ${dato}
                                    </div>
                                </div>
                            `;
                            container.innerHTML += kortHTML;
                        }
                    }
                });

                if (totaltAntall === 0) {
                    container.innerHTML = '<p class="status-msg">Fant ingen konserter. Sjekk at formatet matcher "Artist – NO (DD-MM-YYYY)".</p>';
                }

            } catch (error) {
                container.innerHTML = `<p class="status-msg" style="color: #ff6b6b;">Feil: ${error.message}<br>Husk at filene må ligge i samme mappe, og husk nettleser-regelen (bruk f.eks. Firefox lokalt).</p>`;
            }
        }

        window.onload = lastInnKonserter;
    </script>

</body>
</html>
