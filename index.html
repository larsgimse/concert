<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Konserter</title>
    <style>
        /* Stilrent og moderne mørkt tema */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 3rem 1rem;
            width: 100%;
            background: linear-gradient(180deg, #1f2833 0%, #0b0c10 100%);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #66fcf1;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            color: #45f3ff;
            margin-top: 0.5rem;
            font-style: italic;
        }

        /* Container for konsertene */
        .concert-container {
            max-width: 800px;
            width: 90%;
            margin: 2rem 0;
        }

        /* Styling for hvert konsert-kort som genereres */
        .concert-card {
            background-color: #1f2833;
            border-left: 5px solid #66fcf1;
            border-radius: 4px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .concert-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 252, 241, 0.2);
        }

        .concert-info h2 {
            margin: 0 0 0.5rem 0;
            color: #ffffff;
            font-size: 1.4rem;
        }

        .concert-details {
            font-size: 0.9rem;
            color: #a9b7c6;
        }

        .concert-details .location {
            margin-right: 15px;
            color: #45f3ff;
        }

        /* Dato-merkelapp */
        .concert-date {
            background-color: #0b0c10;
            color: #66fcf1;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid #66fcf1;
            white-space: nowrap;
        }

        /* Feilmelding/Laster-tekst */
        .status-msg {
            text-align: center;
            font-style: italic;
            color: #a9b7c6;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mine Konsertopplevelser</h1>
        <p>Automatisk synkronisert fra konsertliste.txt</p>
    </header>

    <main class="concert-container" id="concert-list">
        <p class="status-msg">Laster inn konserter...</p>
    </main>

    <script>
        // Funksjon som henter og leser txt-filen
        async function lastInnKonserter() {
            const container = document.getElementById('concert-list');
            
            try {
                // Henter filen (må ligge i samme mappe)
                const response = await fetch('konsertliste.txt');
                
                if (!response.ok) {
                    throw new Error('Kunne ikke laste konsertliste.txt');
                }
                
                const tekstData = await response.text();
                
                // Deler opp filen linje for linje
                const linjer = tekstData.split('\n');
                
                // Tømmer "Laster inn..." teksten
                container.innerHTML = '';
                
                let antallKonserter = 0;

                linjer.forEach(linje => {
                    // Hopper over tomme linjer
                    if (linje.trim() === '') return;

                    // DELER LINJEN UT FRA TEGNET '|'. 
                    // Hvis du bruker semikolon i filen din, endrer du '|' til ';' under.
                    const deler = linje.split('|');

                    // Sjekker at linjen faktisk har 3 deler (Artist, Land, Dato)
                    if (deler.length >= 3) {
                        const artist = deler[0].trim();
                        const land = deler[1].trim();
                        const dato = deler[2].trim();
                        
                        antallKonserter++;

                        // Lager HTML-strukturen for konserten
                        const kort HTML = `
                            <div class="concert-card">
                                <div class="concert-info">
                                    <h2>${artist}</h2>
                                    <div class="concert-details">
                                        <span class="location">🌍 ${land}</span>
                                    </div>
                                </div>
                                <div class="concert-date">
                                    ${dato}
                                </div>
                            </div>
                        `;
                        
                        // Legger til kortet på siden
                        container.innerHTML += kortHTML;
                    }
                });

                if (antallKonserter === 0) {
                    container.innerHTML = '<p class="status-msg">Fant ingen gyldige konserter i filen. Sjekk formatet.</p>';
                }

            } catch (error) {
                container.innerHTML = `<p class="status-msg" style="color: #ff6b6b;">Feil: ${error.message}<br>Sørg for at index.html og konsertliste.txt ligger i samme mappe.</p>`;
            }
        }

        // Kjører funksjonen når siden lastes inn
        window.onload = lastInnKonserter;
    </script>

</body>
</html>
