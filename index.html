<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Konsertopplevelser - Vektet Ordsky</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --text-main: #ffffff;
            --text-muted: #4e4f54;
            --accent: #66fcf1;
            --tooltip-bg: #1f2833;
            --badge-bg: #0b0c10;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            padding: 5rem 1rem 3rem 1rem;
            max-width: 600px;
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            color: #71717a;
            margin-top: 0.5rem;
            font-size: 1rem;
            font-weight: 300;
        }

        /* Ordskyen */
        .cloud-container {
            max-width: 950px;
            width: 85%;
            margin-bottom: 5rem;
            text-align: center;
            line-height: 2.6; /* Litt mer luft mellom linjene så boksene ikke overlapper */
        }

        /* Artist-navnene */
        .cloud-item {
            display: inline-block;
            position: relative;
            margin: 0 14px;
            cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease;
            color: #d4d4d8;
            padding: 5px 0; /* Gjør treffpunktet for musa litt større */
        }

        .cloud-item:hover {
            color: var(--accent);
            transform: scale(1.03);
            z-index: 10;
        }

        /* Skriftstørrelser basert på rating */
        .size-10 { font-size: 2.8rem; font-weight: 700; color: #ffffff; }
        .size-9  { font-size: 2.3rem; font-weight: 600; color: #f4f4f5; }
        .size-8  { font-size: 1.8rem; font-weight: 500; color: #e4e4e7; }
        .size-7  { font-size: 1.4rem; font-weight: 400; color: #a1a1aa; }
        .size-6  { font-size: 1.1rem; font-weight: 300; color: #71717a; }

        /* POP-UP / TOOLTIP BOKS */
        .tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            bottom: 105%; /* Flyttet helt ned på kanten av teksten */
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background-color: var(--tooltip-bg);
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 8px;
            white-space: nowrap;
            transition: opacity 0.15s ease, transform 0.15s ease, visibility 0.15s;
            z-index: 99;
            
            /* SIKKERHETSBRO: Denne tykke bunn-paddingen fungerer som en usynlig */
            /* bro mellom pop-upen og teksten under, så den ikke lukker seg. */
            padding-bottom: 20px; 
        }

        /* Den lille pilen i bunnen av pop-upen */
        .tooltip::after {
            content: "";
            position: absolute;
            top: calc(100% - 10px); /* Justert for å passe med den nye paddingen */
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }

        /* Viser pop-up ved hover */
        .cloud-item:hover .tooltip {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Radene inni pop-upen */
        .tooltip-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        /* Ovale badges */
        .oval-badge {
            background-color: var(--badge-bg);
            color: #e4e4e7;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-family: monospace;
        }

        /* Vis mer info-knappen (Google-lenken) */
        .search-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.03);
            transition: background-color 0.2s, color 0.2s;
            border: 1px solid rgba(102, 252, 241, 0.2);
        }

        .search-link:hover {
            background-color: var(--accent);
            color: #0b0c10;
        }

        .status-msg {
            text-align: center;
            font-style: italic;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <h1>Konsertskyen</h1>
        <p>Dine beste og mest sette opplevelser preger toppen av skyen</p>
    </header>

    <main class="cloud-container" id="cloud">
        <p class="status-msg">Konstruerer skyen...</p>
    </main>

    <script>
        const flaggKart = { 
            'NO': '🇳🇴', 'SE': '🇸🇪', 'DK': '🇩🇰', 'UK': '🇬🇧', 'GB': '🇬🇧', 
            'US': '🇺🇸', 'DE': '🇩🇪', 'NL': '🇳🇱', 'FR': '🇫🇷', 'FI': '🇫🇮', 
            'PL': '🇵🇱', 'IE': '🇮🇪' 
        };
        function hentFlagg(landekode) { return flaggKart[landekode.toUpperCase()] || '🌍'; }

        function parseScore(ratingStr) {
            if (!ratingStr) return 0;
            const tall = parseFloat(ratingStr.split('/')[0]);
            return isNaN(tall) ? 0 : tall;
        }

        function hentStørrelseKlasse(score) {
            if (score === 10) return 'size-10';
            if (score === 9) return 'size-9';
            if (score === 8) return 'size-8';
            if (score === 7) return 'size-7';
            return 'size-6';
        }

        async function genererAvansertOrdsky() {
            const cloud = document.getElementById('cloud');
            
            try {
                const [konsertRes, referanseRes] = await Promise.all([
                    fetch('konsertliste.txt'),
                    fetch('referanseliste.txt')
                ]);

                if (!konsertRes.ok || !referanseRes.ok) {
                    throw new Error('Kunne ikke laste filene. Sjekk mappen.');
                }

                const konsertTekst = await konsertRes.text();
                const referanseTekst = await referanseRes.text();

                const ratingOrdbok = {};
                referanseTekst.split('\n').forEach(linje => {
                    if (linje.trim() === '') return;
                    const ratingMatch = linje.match(/^\[([^\]]+)\]/);
                    if (!ratingMatch) return;
                    
                    const rating = ratingMatch[1].trim();
                    const resten = linje.replace(/^\[[^\]]+\]/, '').trim();
                    const sep = resten.includes('–') ? '–' : '-';
                    const deler = resten.split(sep);
                    
                    if (deler.length >= 2) {
                        const art = deler[0].trim().toLowerCase();
                        const konsertDel = deler.slice(1).join(sep).trim();
                        const regex = /([A-Za-z]{2,3})\s*\(([^)]+)\)/g;
                        let match;
                        while ((match = regex.exec(konsertDel)) !== null) {
                            ratingOrdbok[`${art}_${match[2].trim()}`] = rating;
                        }
                    }
                });

                const artistArray = [];
                konsertTekst.split('\n').forEach(linje => {
                    if (linje.trim() === '') return;
                    const sep = linje.includes('–') ? '–' : '-';
                    const deler = linje.split(sep);
                    
                    if (deler.length >= 2) {
                        const artistNavn = deler[0].trim();
                        const konsertDel = deler.slice(1).join(sep).trim();
                        const regex = /([A-Za-z]{2,3})\s*\(([^)]+)\)/g;
                        let match;
                        let konserter = [];
                        let maksScore = 0;

                        while ((match = regex.exec(konsertDel)) !== null) {
                            const land = match[1].toUpperCase();
                            const dato = match[2].trim();
                            const scoreTall = parseScore(ratingOrdbok[`${artistNavn.toLowerCase()}_${dato}`]);

                            if (scoreTall > maksScore) maksScore = scoreTall;
                            konserter.push({ land, dato });
                        }

                        if (konserter.length > 0) {
                            artistArray.push({ 
                                navn: artistNavn, 
                                konserter: konserter, 
                                toppScore: maksScore,
                                totaltSett: konserter.length
                            });
                        }
                    }
                });

                artistArray.sort((a, b) => {
                    if (b.toppScore !== a.toppScore) {
                        return b.toppScore - a.toppScore;
                    }
                    return b.totaltSett - a.totaltSett;
                });

                cloud.innerHTML = '';
                artistArray.forEach(artist => {
                    const størrelseKlasse = hentStørrelseKlasse(artist.toppScore);
                    
                    let raderHTML = '';
                    artist.konserter.forEach(c => {
                        const søkeTekst = encodeURIComponent(`${artist.navn} ${c.land} ${c.dato} concert`);
                        const googleSøkUrl = `https://www.google.com/search?q=${søkeTekst}`;

                        raderHTML += `
                            <div class="tooltip-row">
                                <div class="oval-badge">
                                    <span>${hentFlagg(c.land)}</span>
                                    <span>${c.dato}</span>
                                </div>
                                <a class="search-link" href="${googleSøkUrl}" target="_blank" rel="noopener noreferrer">
                                    Vis info 🔗
                                </a>
                            </div>
                        `;
                    });

                    const itemHTML = `
                        <div class="cloud-item ${størrelseKlasse}">
                            ${artist.navn}
                            <div class="tooltip">
                                ${raderHTML}
                            </div>
                        </div>
                    `;
                    cloud.innerHTML += itemHTML;
                });

            } catch (error) {
                cloud.innerHTML = `<p class="status-msg" style="color: #ff6b6b;">Feil: ${error.message}</p>`;
            }
        }

        window.onload = genererAvansertOrdsky;
    </script>

</body>
</html>
