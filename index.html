<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Konsertvegg med Rating</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent: #66fcf1;
            --text-main: #ffffff;
            --text-sub: #a9b7c6;
            --gold: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-sub);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 4rem 1rem 2rem 1rem;
            width: 100%;
            background: linear-gradient(180deg, #141a22 0%, var(--bg-color) 100%);
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
        }

        header p {
            color: #45f3ff;
            margin-top: 0.7rem;
            font-size: 1.1rem;
        }

        /* Grid-galleri */
        .concert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: minmax(160px, auto);
            gap: 25px;
            max-width: 1200px;
            width: 90%;
            margin: 2rem 0;
        }

        /* Basis-kort */
        .concert-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
        }

        /* Størrelser basert på antall ganger sett */
        .concert-card.tier-2 { grid-column: span 2; }
        .concert-card.tier-3 { grid-column: span 2; grid-row: span 2; }

        .concert-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(102, 252, 241, 0.2);
        }

        .artist-name {
            margin: 0;
            color: var(--text-main);
            font-size: 1.4rem;
            font-weight: 700;
            z-index: 2;
        }
        .tier-2 .artist-name { font-size: 1.8rem; }
        .tier-3 .artist-name { font-size: 2.4rem; text-transform: uppercase; }

        /* Container for badges øverst i hjørnet */
        .badge-container {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
            z-index: 2;
            width: 85%;
        }

        /* Selve datolinjen med rating integrert */
        .concert-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(11, 12, 16, 0.85);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: monospace;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }

        .date-text {
            color: #fff;
            font-weight: bold;
        }

        /* Visuell rating-badge */
        .rating-badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.75rem;
        }

        /* Fargekoding basert på score */
        .rate-10 { background-color: var(--gold); color: #000; box-shadow: 0 0 8px var(--gold); }
        .rate-9 { background-color: #10b981; color: #000; }
        .rate-8 { background-color: #059669; color: #fff; }
        .rate-7 { background-color: #3b82f6; color: #fff; }
        .rate-6 { background-color: #6b7280; color: #fff; }
        .rate-unknown { background-color: #374151; color: #9ca3af; }

        /* Gullglød for kort med 10/10-konserter */
        .has-perfect-score {
            border: 1px solid rgba(245, 158, 11, 0.4);
        }
        .has-perfect-score:hover {
            border-color: var(--gold);
            box-shadow: 0 15px 30px rgba(245, 158, 11, 0.2);
        }

        /* Bakgrunns-tall */
        .concert-count {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 4rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            user-select: none;
            z-index: 1;
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            font-style: italic;
            padding: 3rem;
        }

        @media (max-width: 768px) {
            .concert-grid { grid-template-columns: 1fr; }
            .concert-card.tier-2, .concert-card.tier-3 { grid-column: span 1; grid-row: span 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Konsertveggen</h1>
        <p>Visuelt galleri basert på historikk og rangeringer ★</p>
    </header>

    <main class="concert-grid" id="concert-grid">
        <p class="status-msg">Henter konserter og referanser...</p>
    </main>

    <script>
        // Utvidet flaggkart ut fra dine nye landekoder (PL, IE, GB, NL)
        const flaggKart = { 
            'NO': '🇳🇴', 'SE': '🇸🇪', 'DK': '🇩🇰', 'UK': '🇬🇧', 'GB': '🇬🇧', 
            'US': '🇺🇸', 'DE': '🇩🇪', 'NL': '🇳🇱', 'FR': '🇫🇷', 'FI': '🇫🇮', 
            'PL': '🇵🇱', 'IE': '🇮🇪' 
        };
        function hentFlagg(landekode) { return flaggKart[landekode.toUpperCase()] || '🌍'; }

        function hentRatingKlasse(ratingStr) {
            if (!ratingStr) return 'rate-unknown';
            const tall = parseInt(ratingStr.split('/')[0]);
            if (tall === 10) return 'rate-10';
            if (tall === 9) return 'rate-9';
            if (tall === 8) return 'rate-8';
            if (tall === 7) return 'rate-7';
            if (tall >= 5) return 'rate-6';
            return 'rate-unknown';
        }

        async function genererSiden() {
            const grid = document.getElementById('concert-grid');
            
            try {
                const [konsertRes, referanseRes] = await Promise.all([
                    fetch('konsertliste.txt'),
                    fetch('referanseliste.txt')
                ]);

                if (!konsertRes.ok || !referanseRes.ok) {
                    throw new Error('Kunne ikke laste inn filene. Sjekk at både konsertliste.txt og referanseliste.txt ligger i samme mappe.');
                }

                const konsertTekst = await konsertRes.text();
                const referanseTekst = await referanseRes.text();

                // MAPPER RATING UT FRA NYTT FORMAT: [10/10] Artist – NO (DATO)
                const ratingOrdbok = {};
                referanseTekst.split('\n').forEach(linje => {
                    if (linje.trim() === '') return;

                    // Finn rating mellom [ og ]
                    const ratingMatch = linje.match(/^\[([^\]]+)\]/);
                    if (!ratingMatch) return;
                    
                    const rating = ratingMatch[1].trim(); // F.eks "10/10"
                    
                    // Fjern [10/10] fra linjen for å prosessere resten av teksten
                    const restenAvLinjen = linje.replace(/^\[[^\]]+\]/, '').trim();
                    
                    const sep = restenAvLinjen.includes('–') ? '–' : '-';
                    const deler = restenAvLinjen.split(sep);
                    
                    if (deler.length >= 2) {
                        const art = deler[0].trim().toLowerCase();
                        const konsertDel = deler.slice(1).join(sep).trim();

                        const regex = /([A-Za-z]{2,3})\s*\(([^)]+)\)/g;
                        let match;
                        while ((match = regex.exec(konsertDel)) !== null) {
                            const dat = match[2].trim();
                            // Lagrer ratingen med nøkkel "artist_dato"
                            ratingOrdbok[`${art}_${dat}`] = rating;
                        }
                    }
                });

                // GENERERER GRID UT FRA KONSERTLISTEN
                grid.innerHTML = '';
                let totaltKort = 0;
                const linjer = konsertTekst.split('\n');

                linjer.forEach(linje => {
                    if (linje.trim() === '') return;
                    const sep = linje.includes('–') ? '–' : '-';
                    const deler = linje.split(sep);
                    
                    if (deler.length >= 2) {
                        const artist = deler[0].trim();
                        const konsertDel = deler.slice(1).join(sep).trim();

                        const regex = /([A-Za-z]{2,3})\s*\(([^)]+)\)/g;
                        let match;
                        let artisterKonserter = [];

                        while ((match = regex.exec(konsertDel)) !== null) {
                            artisterKonserter.push({ land: match[1].toUpperCase(), dato: match[2].trim() });
                        }

                        const antallGangerSett = artisterKonserter.length;

                        if (antallGangerSett > 0) {
                            totaltKort++;
                            
                            let tierKlasse = '';
                            if (antallGangerSett === 2) tierKlasse = 'tier-2';
                            if (antallGangerSett >= 3) tierKlasse = 'tier-3';

                            let rowsHTML = '';
                            let harPerfektScore = false;

                            artisterKonserter.forEach(c => {
                                const flagg = hentFlagg(c.land);
                                const oppslagsNøkkel = `${artist.toLowerCase()}_${c.dato}`;
                                const rating = ratingOrdbok[oppslagsNøkkel] || ''; 
                                const ratingKlasse = hentRatingKlasse(rating);

                                if (rating.includes('10/10')) harPerfektScore = true;

                                rowsHTML += `
                                    <div class="concert-row">
                                        <span class="date-text">${flagg} ${c.dato}</span>
                                        <span class="rating-badge ${ratingKlasse}">${rating || 'N/A'}</span>
                                    </div>
                                `;
                            });

                            const perfektKlasse = harPerfektScore ? 'has-perfect-score' : '';

                            const kortHTML = `
                                <div class="concert-card ${tierKlasse} ${perfektKlasse}">
                                    <div class="concert-count">${antallGangerSett}x</div>
                                    <div class="badge-container">
                                        ${rowsHTML}
                                    </div>
                                    <h2 class="artist-name">${artist}</h2>
                                </div>
                            `;
                            grid.innerHTML += kortHTML;
                        }
                    }
                });

                if (totaltKort === 0) grid.innerHTML = '<p class="status-msg">Ingen konserter funnet.</p>';

            } catch (error) {
                grid.innerHTML = `<p class="status-msg" style="color: #ff6b6b;">Feil: ${error.message}</p>`;
            }
        }

        window.onload = genererSiden;
    </script>

</body>
</html>
